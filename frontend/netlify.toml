[build]
  command = "npm run build"
  publish = "dist"

# Si VITE_API_URL no está en el build, /api se proxy al backend (actualiza el dominio si cambia).
[[redirects]]
  from = "/api/*"
  to = "https://simevaluacion-production.up.railway.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
