services:
  mysql:
    image: mysql:8.4
    container_name: simevaluacion-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: simevaluacion
      MYSQL_USER: simeval
      MYSQL_PASSWORD: simeval_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

